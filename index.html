<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VertexForge</title>

  <!-- GLITCH CYBER FAVICON -->
  <link rel="icon" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <defs>
      <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
        <stop offset='0%' stop-color='%2300d4ff'/>
        <stop offset='100%' stop-color='%237c3aed'/>
      </linearGradient>
    </defs>

    <!-- glitch base shadow layers -->
    <text x='50' y='58' text-anchor='middle'
      font-size='34' font-family='Arial Black'
      fill='%23ff00ff' opacity='0.6'
      transform='translate(-2 -1)'>
      VF
    </text>

    <text x='50' y='58' text-anchor='middle'
      font-size='34' font-family='Arial Black'
      fill='%2300ffff' opacity='0.6'
      transform='translate(2 1)'>
      VF
    </text>

    <!-- main core -->
    <text x='50' y='58'
      text-anchor='middle'
      font-size='34'
      font-family='Arial Black'
      fill='url(%23g)'>
      VF
    </text>

    <!-- glitch bar -->
    <rect x='20' y='45' width='60' height='2' fill='white' opacity='0.15'>
      <animate attributeName='y' values='40;60;40' dur='1.2s' repeatCount='indefinite'/>
    </rect>

  </svg>">

  <link rel="stylesheet" href="style.css">

  <!-- GLITCH LOGO STYLE -->
  <style>
    .logo {
      position: relative;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #00d4ff;
      text-transform: uppercase;
      animation: flicker 3s infinite;
    }

    .logo::before,
    .logo::after {
      content: "VertexForge";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
    }

    .logo::before {
      color: #ff00ff;
      animation: glitch1 2s infinite linear alternate-reverse;
      z-index: -1;
    }

    .logo::after {
      color: #00ffff;
      animation: glitch2 1.6s infinite linear alternate-reverse;
      z-index: -2;
    }

    @keyframes glitch1 {
      0% { transform: translate(0,0); }
      25% { transform: translate(-2px,1px); }
      50% { transform: translate(2px,-1px); }
      75% { transform: translate(-1px,2px); }
      100% { transform: translate(0,0); }
    }

    @keyframes glitch2 {
      0% { transform: translate(0,0); }
      25% { transform: translate(2px,-2px); }
      50% { transform: translate(-2px,2px); }
      75% { transform: translate(1px,-1px); }
      100% { transform: translate(0,0); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 0.9; }
      93% { opacity: 0.3; }
      94% { opacity: 1; }
      96% { opacity: 0.7; }
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: white;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .tag {
      color: #888;
    }

    .hero {
      padding: 80px 40px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #111;
      padding: 20px;
      border: 1px solid #222;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .card:hover {
      border-color: #00d4ff;
      transform: translateY(-5px);
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>

<body>

<header class="nav">
  <div class="logo">VertexForge</div>
  <div class="tag">Dev Hub</div>
</header>

<section class="hero">
  <h1>Build. Experiment. Deploy.</h1>
  <p>A collection of web apps, AI tools and creative experiments.</p>
</section>

<section class="projects">

  <a class="card" href="#">
    <h2>🧠 Portfolio Case Study</h2>
    <p>Design + frontend experiment with modern UI</p>
  </a>

  <a class="card" href="#">
    <h2>🤖 AI Tools</h2>
    <p>Coming soon</p>
  </a>

  <a class="card" href="#">
    <h2>⚙️ Web Utilities</h2>
    <p>Coming soon</p>
  </a>

</section>

<footer>
  © 2026 VertexForgeDev
</footer>

</body>
</html>
