<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VertexForge</title>

  <link rel="stylesheet" href="style.css">

  <!-- GLITCH STYLE -->
  <style>
    .logo {
      position: relative;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #00d4ff;
      text-transform: uppercase;
      animation: flicker 3s infinite;
    }

    /* duplicate layers */
    .logo::before,
    .logo::after {
      content: "VertexForge";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
    }

    .logo::before {
      color: #ff00ff;
      z-index: -1;
      animation: glitch1 2s infinite linear alternate-reverse;
    }

    .logo::after {
      color: #00ffff;
      z-index: -2;
      animation: glitch2 1.6s infinite linear alternate-reverse;
    }

    @keyframes glitch1 {
      0%   { transform: translate(0,0); clip-path: inset(0 0 0 0); }
      20%  { transform: translate(-2px,1px); clip-path: inset(10% 0 60% 0); }
      40%  { transform: translate(2px,-1px); clip-path: inset(40% 0 20% 0); }
      60%  { transform: translate(-1px,2px); clip-path: inset(20% 0 40% 0); }
      100% { transform: translate(0,0); clip-path: inset(0 0 0 0); }
    }

    @keyframes glitch2 {
      0%   { transform: translate(0,0); clip-path: inset(0 0 0 0); }
      25%  { transform: translate(2px,-2px); clip-path: inset(60% 0 10% 0); }
      50%  { transform: translate(-2px,2px); clip-path: inset(10% 0 60% 0); }
      75%  { transform: translate(1px,-1px); clip-path: inset(30% 0 30% 0); }
      100% { transform: translate(0,0); clip-path: inset(0 0 0 0); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 0.9; }
      93% { opacity: 0.4; }
      94% { opacity: 1; }
      96% { opacity: 0.7; }
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    .tag {
      color: #888;
      font-size: 14px;
    }

    body {
      background: #0a0a0f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .hero {
      padding: 80px 40px;
    }

    .hero h1 {
      font-size: 42px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #111;
      padding: 20px;
      border: 1px solid #222;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .card:hover {
      border-color: #00d4ff;
      transform: translateY(-5px);
    }

    footer {
      padding: 40px;
      color: #666;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- NAV -->
<header class="nav">
  <div class="logo">VertexForge</div>
  <div class="tag">Dev Hub</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Build. Experiment. Deploy.</h1>
  <p>A collection of web apps, AI tools and creative experiments.</p>
</section>

<!-- PROJECTS -->
<section class="projects">

  <a class="card" href="#">
    <h2>🧠 Portfolio Case Study</h2>
    <p>Design + frontend experiment with modern UI</p>
  </a>

  <a class="card" href="#">
    <h2>🤖 AI Tools</h2>
    <p>Coming soon</p>
  </a>

  <a class="card" href="#">
    <h2>⚙️ Web Utilities</h2>
    <p>Coming soon</p>
  </a>

</section>

<!-- FOOTER -->
<footer>
  © 2026 VertexForgeDev
</footer>

</body>
</html>
