<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VertexForge</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-09K1QXMWJ4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-09K1QXMWJ4');
  </script>

  <link rel="icon" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <defs>
      <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
        <stop offset='0%' stop-color='%2300ff88'/>
        <stop offset='100%' stop-color='%2300cc66'/>
      </linearGradient>
    </defs>
    <text x='50' y='58' text-anchor='middle'
      font-size='40'
      font-family='Arial Black'
      fill='url(%23g)'>VF</text>
  </svg>">

  <style>
    /* =========================
       GLOBAL TERMINAL THEME
    ========================= */

    body {
      margin: 0;
      font-family: Consolas, Monaco, monospace;
      background: radial-gradient(circle at center, rgba(0,255,140,0.08), transparent 55%), #050505;
      color: #00ff88;
      overflow-x: hidden;
      /* Added to prevent overlap */
      padding-bottom: 150px; 
      min-height: 100vh;
      box-sizing: border-box;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(transparent, transparent 2px, rgba(0,255,140,0.03) 3px);
      z-index: 0;
    }

    /* =========================
       LOGO
    ========================= */

    .logo {
      position: relative;
      font-weight: bold;
      color: #00ff88;
      letter-spacing: 1px;
      animation: flicker 3s infinite;
    }

    .logo::before, .logo::after {
      content: "VertexForge";
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
    }

    .logo::before { color: #00ff88; opacity: 0.6; animation: glitch1 2s infinite linear alternate-reverse; z-index: -1; }
    .logo::after { color: #00cc66; opacity: 0.4; animation: glitch2 1.6s infinite linear alternate-reverse; z-index: -2; }

    @keyframes glitch1 { 0% { transform: translate(0,0); } 25% { transform: translate(-2px,1px); } 50% { transform: translate(2px,-1px); } 75% { transform: translate(-1px,2px); } 100% { transform: translate(0,0); } }
    @keyframes glitch2 { 0% { transform: translate(0,0); } 25% { transform: translate(2px,-2px); } 50% { transform: translate(-2px,2px); } 75% { transform: translate(1px,-1px); } 100% { transform: translate(0,0); } }
    @keyframes flicker { 0%, 100% { opacity: 1; } 92% { opacity: 0.9; } 93% { opacity: 0.3; } 94% { opacity: 1; } 96% { opacity: 0.7; } }

    /* =========================
       INTRO
    ========================= */

    #terminal-intro {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(0,255,140,.08), transparent 50%), #050505;
    }

    #terminal-content {
      width: min(900px, 90%);
      color: #00ff88;
      font-family: Consolas, monospace;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      text-shadow: 0 0 8px rgba(0,255,136,.7);
    }

    #terminal-intro.fade-out { animation: fadeOut 1s forwards; }
    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

    /* =========================
       COMMAND LINE INPUT
    ========================= */

    .command-line {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99998;
      width: min(700px, 90%);
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(0,255,140,0.25);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      border-radius: 8px;
    }

    .prompt { color: #00ff88; margin-right: 8px; }
    .command-line input { flex: 1; background: transparent; border: none; outline: none; color: #00ff88; font-family: inherit; font-size: 14px; }

    .response {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: min(700px, 90%);
      color: rgba(0,255,136,0.8);
      font-size: 13px;
      white-space: pre-wrap;
      pointer-events: none;
    }

    /* =========================
       UI
    ========================= */

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,255,140,0.15);
      z-index: 10;
    }

    .tag { color: rgba(0,255,136,0.6); }
    .hero { text-align: center; padding: 100px 20px 60px; }
    .hero h1 { font-size: 42px; color: #00ff88; }
    .hero p { opacity: 0.6; color: #00ff88; }

    .projects {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1000px;
      margin: auto;
      padding: 40px;
    }

    .card {
      padding: 25px;
      background: rgba(0,255,140,0.03);
      border: 1px solid rgba(0,255,140,0.15);
      border-radius: 10px;
      text-decoration: none;
      color: #00ff88;
      transition: 0.3s;
    }

    .card:hover { transform: translateY(-6px); background: rgba(0,255,140,0.06); border-color: rgba(0,255,140,0.3); }
    footer { text-align: center; padding: 50px; color: rgba(0,255,140,0.4); }

    /* RESPONSIVE OPTIMIZATIONS */
    @media (max-width: 900px) { .projects { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { 
      .nav { padding: 20px; }
      .hero h1 { font-size: 32px; }
      .projects { grid-template-columns: 1fr; padding: 20px; }
      body { padding-bottom: 180px; }
    }
  </style>
</head>

<body>
<div id="terminal-intro"><div id="terminal-content"></div></div>

<header class="nav">
  <div class="logo">VertexForge</div>
  <div class="tag">Dev Hub</div>
</header>

<section class="hero">
  <h1>Build. Experiment. Deploy.</h1>
  <p>A collection of web apps, AI tools and creative experiments.</p>
</section>

<section class="projects">
  <a class="card" href="#"><h2>🧠 Portfolio Study</h2><p>Coming soon</p></a>
  <a class="card" href="#"><h2>🤖 AI Tools</h2><p>Coming soon</p></a>
  <a class="card" href="#"><h2>⚙️ Web Utilities</h2><p>Coming soon</p></a>
</section>

<footer>© 2026 VertexForgeDev</footer>

<div class="response" id="response"></div>
<div class="command-line">
  <span class="prompt">></span>
  <input id="cmd" placeholder="run diagnostics" />
</div>

<script>
const terminalLines = ["[ VertexForge Secure Environment ]", "", "> Initializing core systems...", "> Loading modules...", "> Booting interface...", "", "> Access granted.", "> Welcome, Visitor."];
const terminal = document.getElementById("terminal-content");
const intro = document.getElementById("terminal-intro");
let line = 0, char = 0;
function typeWriter() {
  if (line >= terminalLines.length) {
    setTimeout(() => { intro.classList.add("fade-out"); setTimeout(() => intro.remove(), 1000); }, 600);
    return;
  }
  const current = terminalLines[line];
  if (char < current.length) { terminal.innerHTML += current.charAt(char++); setTimeout(typeWriter, 18); } 
  else { terminal.innerHTML += "\n"; line++; char = 0; setTimeout(typeWriter, 100); }
}
window.addEventListener("load", () => setTimeout(typeWriter, 300));
const input = document.getElementById("cmd"), response = document.getElementById("response");
window.addEventListener("load", () => input.focus());
document.addEventListener("click", () => input.focus());
input.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const cmd = input.value.toLowerCase().trim();
  if (!cmd) return;
  if (cmd === "run diagnostics") response.textContent = "SYSTEM CHECK:\n- CPU: OK\n- MEMORY: OK\n- NETWORK: OK\n- UI ENGINE: STABLE\nSTATUS: SYSTEM ONLINE";
  else if (cmd === "clear") response.textContent = "";
  else if (cmd === "help") response.textContent = "AVAILABLE COMMANDS:\n- run diagnostics\n- help\n- clear";
  else response.textContent = `UNKNOWN COMMAND: ${cmd}`;
  input.value = "";
});
</script>
</body>
</html>
